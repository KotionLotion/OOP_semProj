<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../css/style.css">
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- bootstrap.css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        
    <title>Employee Shift Dashboard</title>
</head>

<body>
    <div class="container-fluid">
        <!-- Nav Bar -->
        <div class="header-bar d-flex align-items-center justify-content-between">
            <div>
                <!-- logo here -->
                <h3>LOGO</h3>
            </div>
            <nav class="main-nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="#" class="nav-link">Shifts</a>
                <a href="#" class="nav-link">Employees</a>
            </nav>
        </div>  

        <!-- Welcome Card -->
        <div class="card mt-4">
            <div class="card-body text-center">
                <h1 class="m-0">Welcome!</h1>
                <p class="text-muted p-1">OOP Semester Project | J. Mai, J. Melgar, A. Sylvester</p>
            </div>
        </div>

       <div class="row mt-4">

    <!-- Employees Card -->
    <div class="col-md-12 col-lg-4 mb-3">
        <a href="#" class="text-decoration-none">
            <div class="card h-100 d-flex align-items-center position-relative">
                <!-- Icon -->
                <i class="fas fa-users fa-6x position-absolute text-muted" style="opacity:0.1; right:10px; bottom:10px;"></i>
                <div class="card-body text-left">
                    <h5>Employees</h5>
                    <p>Total: 25</p>
                </div>
            </div>
        </a>
    </div>

    <!-- Shifts Card -->
    <div class="col-md-12 col-lg-4 mb-3">
        <a href="#" class="text-decoration-none">
            <div class="card h-100 d-flex align-items-center position-relative">
                <i class="fas fa-clock fa-6x position-absolute text-muted" style="opacity:0.1; right:10px; bottom:10px;"></i>
                <div class="card-body text-left">
                    <h5>Shifts Today</h5>
                    <p>Morning: 10 | Evening: 8</p>
                </div>
            </div>
        </a>
    </div>

    <!-- Pending Assignments Card -->
    <div class="col-md-12 col-lg-4 mb-3">
        <a href="#" class="text-decoration-none">
            <div class="card h-100 d-flex align-items-center position-relative">
                <i class="fas fa-tasks fa-6x position-absolute text-muted" style="opacity:0.1; right:10px; bottom:10px;"></i>
                <div class="card-body text-left">
                    <h5>IDK? Employees off?</h5>
                    <p>?</p>
                </div>
            </div>
        </a>
    </div>

</div>

    </div>

</body>
</html>
